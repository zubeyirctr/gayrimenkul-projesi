openapi: 3.0.0
info:
  title: Gayrimenkul Yönetim API
  version: 2.0.0
  description: |
    JWT tabanlı kimlik doğrulama ile çalışan gayrimenkul yönetim sistemi API'si.
    Korunan endpoint'ler için önce `/api/auth/login` ile token alınmalıdır.

servers:
  - url: http://localhost:3000
    description: Geliştirme Sunucusu

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization başlığına 'Bearer <token>' formatında ekleyin"

  schemas:
    User:
      type: object
      properties:
        id:       { type: integer, example: 1 }
        username: { type: string,  example: johndoe }
        email:    { type: string,  format: email, example: john@example.com }

    Property:
      type: object
      properties:
        id:       { type: integer, example: 1 }
        title:    { type: string,  example: "3+1 Daire Kadıköy" }
        price:    { type: number,  example: 500000 }
        type:
          type: string
          enum: [Satılık, Kiralık]
          example: Satılık
        location: { type: string, example: "İstanbul, Kadıköy" }
        user_id:  { type: integer, example: 1 }

    PropertyInput:
      type: object
      required: [title, price, type, location]
      properties:
        title:    { type: string,  example: "3+1 Daire Kadıköy" }
        price:    { type: number,  minimum: 1, example: 500000 }
        type:
          type: string
          enum: [Satılık, Kiralık]
          example: Satılık
        location: { type: string, example: "İstanbul, Kadıköy" }

    Error:
      type: object
      properties:
        error: { type: string, example: "Hata mesajı" }

    SuccessMessage:
      type: object
      properties:
        message: { type: string, example: "İşlem başarılı" }

tags:
  - name: Auth
    description: Kimlik doğrulama işlemleri
  - name: Properties
    description: Mülk yönetimi (JWT gerektirir)

paths:

  # ── AUTH ──────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Yeni kullanıcı kaydı
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username: { type: string, example: johndoe }
                email:    { type: string, format: email, example: john@example.com }
                password: { type: string, minLength: 6, example: sifre123 }
      responses:
        '201':
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Kullanıcı başarıyla oluşturuldu" }
                  user:    { $ref: '#/components/schemas/User' }
        '400':
          description: Geçersiz giriş (boş alan, email formatı, kısa şifre, tekrar eden kayıt)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Kullanıcı girişi — JWT token döner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email, example: john@example.com }
                password: { type: string, example: sifre123 }
      responses:
        '200':
          description: Giriş başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user: { $ref: '#/components/schemas/User' }
        '401':
          description: Email veya şifre hatalı
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ── PROPERTIES ────────────────────────────────────────

  /api/properties:
    get:
      tags: [Properties]
      summary: Giriş yapan kullanıcıya ait tüm mülkleri listele
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mülk listesi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Property' }
        '401':
          description: Token eksik veya geçersiz
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    post:
      tags: [Properties]
      summary: Yeni mülk ekle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PropertyInput' }
      responses:
        '201':
          description: Mülk oluşturuldu
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Property' }
        '400':
          description: Eksik alan veya geçersiz fiyat
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Token eksik veya geçersiz
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/properties/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
        description: Mülk ID

    get:
      tags: [Properties]
      summary: Tek bir mülkü getir
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mülk bulundu
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Property' }
        '401':
          description: Token eksik veya geçersiz
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Bu mülke erişim yetkiniz yok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Mülk bulunamadı
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    put:
      tags: [Properties]
      summary: Mülk güncelle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PropertyInput' }
      responses:
        '200':
          description: Mülk güncellendi
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Property' }
        '401':
          description: Token eksik veya geçersiz
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Bu mülke erişim yetkiniz yok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Mülk bulunamadı
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      tags: [Properties]
      summary: Mülk sil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mülk silindi
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessMessage' }
        '401':
          description: Token eksik veya geçersiz
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Bu mülke erişim yetkiniz yok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Mülk bulunamadı
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
