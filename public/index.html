<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Gayrimenkul Yönetim Paneli</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <h1>Gayrimenkul Yönetim Paneli </h1>
        
        <input type="text" id="searchInput" placeholder="Mülk ara...">

        </form>

        <div id="propertyList">
            </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
