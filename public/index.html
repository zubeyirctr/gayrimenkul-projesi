<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gayrimenkul Yönetim Sistemi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="navbar-brand-icon">🏠</div>
      Gayrimenkul Yönetim Sistemi
    </div>
    <div class="navbar-right">
      <div class="navbar-user">
        <div class="user-avatar" id="userInitial">?</div>
        <span class="navbar-username" id="usernameDisplay">Kullanıcı</span>
      </div>
      <button class="btn btn-outline" onclick="logout()">Çıkış</button>
    </div>
  </nav>

  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-number" id="statTotal">0</span>
      <span class="stat-label">Toplam Mülk</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="statSatilik">0</span>
      <span class="stat-label">Satılık</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="statKiralik">0</span>
      <span class="stat-label">Kiralık</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="statAvgPrice">0</span>
      <span class="stat-label">Ort. Fiyat (₺)</span>
    </div>
  </div>

  <div class="main-container">

    <!-- Form Paneli -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="formTitle">Yeni Mülk Ekle</span>
      </div>

      <div id="formAlert" class="alert alert-error alert-hidden"></div>

      <form id="propertyForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="title">Başlık</label>
            <input type="text" id="title" class="form-input" placeholder="ör. 3+1 Daire Kadıköy">
          </div>
          <div class="form-group">
            <label class="form-label" for="price">Fiyat (₺)</label>
            <input type="number" id="price" class="form-input" placeholder="ör. 500000" min="1">
          </div>
          <div class="form-group">
            <label class="form-label" for="type">Tür</label>
            <select id="type" class="form-input form-select">
              <option value="">Seçin…</option>
              <option value="Satılık">Satılık</option>
              <option value="Kiralık">Kiralık</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="location">Konum</label>
            <input type="text" id="location" class="form-input" placeholder="ör. İstanbul, Kadıköy">
          </div>
          <div class="form-group">
            <label class="form-label" for="room_count">Oda Sayısı</label>
            <input type="number" id="room_count" class="form-input" placeholder="ör. 3" min="1">
          </div>
          <div class="form-group">
            <label class="form-label" for="square_meters">Metrekare (m²)</label>
            <input type="number" id="square_meters" class="form-input" placeholder="ör. 120" min="1">
          </div>
          <div class="form-group">
            <label class="form-label" for="floor">Kat</label>
            <input type="number" id="floor" class="form-input" placeholder="ör. 3">
          </div>
          <div class="form-group">
            <label class="form-label" for="image_file">Fotoğraf</label>
            <input type="file" id="image_file" class="form-input" accept="image/*">
          </div>
          <div class="form-group col-span-2">
            <label class="form-label" for="description">Açıklama</label>
            <textarea id="description" class="form-input" rows="3"
                      placeholder="Mülk hakkında kısa bir açıklama…"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submitBtn" class="btn btn-primary">Mülk Ekle</button>
          <button type="button" id="cancelBtn" class="btn btn-secondary"
                  style="display:none" onclick="cancelEdit()">İptal</button>
        </div>
      </form>
    </div>

    <!-- Mülk Listesi -->
    <div class="panel">
      <div class="properties-header">
        <span class="section-title">Mülklerim</span>
        <span class="badge" id="propertyCount">0 mülk</span>
      </div>

      <div class="search-bar">
        <svg class="search-bar-icon" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" class="search-input"
               placeholder="Başlık, konum veya türe göre ara…">
      </div>

      <div class="property-grid" id="propertyList">
        <div class="empty-state">
          <div class="empty-icon"></div>
          <h4>Henüz mülk eklenmedi</h4>
          <p>Yukarıdaki formu kullanarak ilk mülkünüzü ekleyin.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    © 2026 <strong>Gayrimenkul Yönetim Sistemi</strong>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
