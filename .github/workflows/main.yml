name: Proje Kontrol Robotu
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: npm test || echo "Testler henüz eklenmedi"
      - run: npm run lint || echo "Linter hataları var"